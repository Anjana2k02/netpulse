name: Build and Release NetPulse

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: v1.0.2

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./netpulse.sln

      - name: Build
        run: dotnet build ./netpulse.sln -c Release --no-restore

      - name: Publish win-x64 (framework-dependent)
        run: >-
          dotnet publish ./NetPulse.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:UseAppHost=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o ./publish/win-x64

      - name: Create zip package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          $zip = "./artifacts/NetPulse-win-x64-framework-dependent-${{ env.RELEASE_VERSION }}.zip"
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath $zip -Force
          $sizeBytes = (Get-Item $zip).Length
          $sizeMb = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "Release ZIP size: $sizeMb MB"
          if ($sizeBytes -gt 10MB) {
            Write-Error "Release ZIP is larger than 10 MB. Current size: $sizeMb MB"
            exit 1
          }
          "ZIP_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: NetPulse ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
