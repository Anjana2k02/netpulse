name: Build and Release NetPulse

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: v1.0.2

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./netpulse.sln

      - name: Build
        run: dotnet build ./netpulse.sln -c Release --no-restore

      - name: Clean publish output
        shell: pwsh
        run: |
          if (Test-Path ./publish/win-x64) {
            Remove-Item ./publish/win-x64 -Recurse -Force
          }

      - name: Publish win-x64 (framework-dependent)
        run: >-
          dotnet publish ./NetPulse.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:UseAppHost=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o ./publish/win-x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          $installer = "./artifacts/NetPulse-Setup-${{ env.RELEASE_VERSION }}.exe"

          if (Test-Path $installer) {
            Remove-Item $installer -Force
          }

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found at expected path: $iscc"
            exit 1
          }

          & $iscc "/DAppVersion=${{ env.RELEASE_VERSION }}" "/DOutputBaseFilename=NetPulse-Setup-${{ env.RELEASE_VERSION }}" "./installer/NetPulse.iss"

          if (-not (Test-Path $installer)) {
            Write-Error "Installer was not generated: $installer"
            exit 1
          }

          $sizeBytes = (Get-Item $installer).Length
          $sizeMb = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "Installer EXE size: $sizeMb MB"
          "INSTALLER_PATH=$installer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: NetPulse ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: ${{ env.INSTALLER_PATH }}
